openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Discord authentication operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/request-code:
    post:
      operationId: requestVerificationCode
      tags: [auth]
      summary: Request a Discord verification code
      description: Sends a 6 digit code to the user's Discord DM. Code is valid for 10 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCodeRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestCodeResponse"
        "404":
          description: Discord user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Cannot DM the user (DMs disabled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify-code:
    post:
      operationId: verifyCode
      tags: [auth]
      summary: Verify a Discord verification code
      description: Verifies the 6 digit code and creates a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
      responses:
        "200":
          description: Verified, session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUser"
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RequestCodeRequest:
      type: object
      properties:
        discordUsername:
          type: string
          minLength: 2
          maxLength: 64
          description: Discord username (without @) or display name
      required:
        - discordUsername
    RequestCodeResponse:
      type: object
      properties:
        ok:
          type: boolean
        expiresInSeconds:
          type: integer
        discordUsername:
          type: string
          description: The matched Discord username
      required:
        - ok
        - expiresInSeconds
        - discordUsername
    VerifyCodeRequest:
      type: object
      properties:
        discordUsername:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
        - discordUsername
        - code
    SessionUser:
      type: object
      properties:
        id:
          type: string
          description: Discord user ID
        username:
          type: string
          description: Discord username
        displayName:
          type: string
          description: Discord global name or username
        avatarUrl:
          type: string
          description: Discord avatar URL
      required:
        - id
        - username
        - displayName
        - avatarUrl
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
